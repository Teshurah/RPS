<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>

  <!-- FIXED CSS PATH -->
  <link rel="stylesheet" href="rockpaperscissors/styles.css" />
</head>

<body>

  <div class="container">
    <h1>Rock Paper Scissors</h1>

    <div class="game">
      <button onclick="playGame('rock')">Rock</button>
      <button onclick="playGame('paper')">Paper</button>
      <button onclick="playGame('scissors')">Scissors</button>
    </div>

    <div class="result">
      <p id="result-text">Make your move!</p>
      <p id="score">Wins: 0 | Losses: 0 | Ties: 0</p>
    </div>

    <button class="reset" onclick="resetScore()">Reset Score</button>
  </div>

  <!-- FIXED JS PATH -->
  <script src="rockpaperscissors/game.js"></script>

</body>
</html>
