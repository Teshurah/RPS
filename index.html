<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-box">
  <h1>✊ Rock Paper Scissors</h1>

  <label>AI Difficulty:</label>
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>

  <div class="buttons">
    <button onclick="play('rock')">✊ Rock</button>
    <button onclick="play('paper')">✋ Paper</button>
    <button onclick="play('scissors')">✌ Scissors</button>
  </div>

  <div class="result" id="result">Make your move!</div>

  <div class="score">
    <div>Player: <span id="playerScore">0</span></div>
    <div>Computer: <span id="computerScore">0</span></div>
    <div>Draws: <span id="draws">0</span></div>
  </div>

  <button class="reset" onclick="resetGame()">Reset Game</button>

  <h3>Game History</h3>
  <div class="history" id="history"></div>
</div>

<!-- 👇 UPDATED FILE NAME -->
<script src="game.js"></script>

</body>
</html>
