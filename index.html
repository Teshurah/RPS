<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPS Battle</title>

  <link rel="stylesheet" href="rockpaperscissors/styles.css"/>
</head>

<body>

  <h1>⚔️ Rock Paper Scissors Battle ⚔️</h1>

  <div class="arena">

    <!-- PLAYER -->
    <div class="side">
      <h2>You</h2>
      <div id="player-choice" class="choice-box">❔</div>
    </div>

    <!-- RESULT -->
    <div class="center">
      <h2>VS</h2>
      <p id="result-text">Make your move!</p>
      <p id="score">Wins: 0 | Losses: 0 | Ties: 0</p>
    </div>

    <!-- COMPUTER -->
    <div class="side">
      <h2>Computer</h2>
      <div id="computer-choice" class="choice-box">❔</div>
    </div>

  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <button onclick="playGame('rock')">Rock</button>
    <button onclick="playGame('paper')">Paper</button>
    <button onclick="playGame('scissors')">Scissors</button>
  </div>

  <button class="reset" onclick="resetScore()">Reset Score</button>

  <script src="rockpaperscissors/game.js"></script>
</body>
</html>
